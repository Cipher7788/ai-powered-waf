version: '3.8'

services:
  waf:
    build: .
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: production
      FLASK_DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in your environment or .env file}
      PORT: 5000
      LOG_FILE: /app/logs/security.log
    volumes:
      - waf_logs:/app/logs
    restart: unless-stopped

volumes:
  waf_logs:
